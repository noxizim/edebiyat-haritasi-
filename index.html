    let clusterGroup = L.markerClusterGroup();
    let markerRefs = [];

    function normalizeText(text) {
      return text
        .toLowerCase()
        .replaceAll('ı', 'i')
        .replaceAll('ğ', 'g')
        .replaceAll('ü', 'u')
        .replaceAll('ş', 's')
        .replaceAll('ö', 'o')
        .replaceAll('ç', 'c')
        .replace(/[^a-z0-9 ]/g, '')
        .trim();
    }

    function distance(a, b) {
      const dp = Array(a.length + 1).fill(null).map(() => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i++) dp[i][0] = i;
      for (let j = 0; j <= b.length; j++) dp[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
        }
      }
      return dp[a.length][b.length];
    }

    function isSearchMatch(placeName, search) {
      const query = normalizeText(search);
      const name = normalizeText(placeName);
      if (!query) return true;
      if (name.includes(query)) return true;
      const words = name.split(' ');
      return words.some(word => distance(query, word) <= 2) || distance(query, name.slice(0, Math.max(query.length, 4))) <= 3;
    }

    function renderMarkers(search = '', filter = 'all') {
      clusterGroup.clearLayers();
      markerRefs = [];

      mekanlar.forEach(mekan => {
        const nameMatch = isSearchMatch(mekan.ad, search);
        const typeMatch = filter === 'all' || mekan.tur === filter;

        if (nameMatch && typeMatch) {
          const marker = L.marker([mekan.lat, mekan.lng]);
          const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(mekan.ad + ' İstanbul')}`;
          marker.bindPopup(`
            <div class="popup-title">${mekan.ad}</div>
            <div>${mekan.aciklama}</div>
            <div><strong>Tür:</strong> ${mekan.tur}</div>
            <div style="margin-top:8px;"><a href="${mapsUrl}" target="_blank" rel="noopener">Google Maps’te kontrol et</a></div>
          `);
          clusterGroup.addLayer(marker);
          markerRefs.push({ marker, mekan });
        }
      });

      map.addLayer(clusterGroup);
    }

    renderMarkers();

    async function geocodeAndFix() {
      const updatedPlaces = [];

      for (let m of mekanlar) {
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(m.ad + ' İstanbul')}`);
          const data = await res.json();

          if (data && data.length > 0) {
            updatedPlaces.push({
              item: m,
              lat: parseFloat(data[0].lat),
              lng: parseFloat(data[0].lon)
            });
          }
        } catch (e) {
          // İnternet / servis hatası olursa mevcut koordinatlarla devam eder.
        }
      }

      updatedPlaces.forEach(place => {
        place.item.lat = place.lat;
        place.item.lng = place.lng;
      });

      renderMarkers(
        document.getElementById('searchBox').value,
        document.getElementById('filterType').value
      );
    }

    setTimeout(geocodeAndFix, 500);

    document.getElementById('searchBox').addEventListener('input', function() {
      const query = this.value;
      const currentFilter = document.getElementById('filterType').value;
      renderMarkers(query, currentFilter);

      if (query.trim().length > 1) {
        const normalizedQuery = query.toLowerCase().trim();
        let bestMatch = null;
        let bestScore = Infinity;

        function distance(a, b) {
          const dp = Array(a.length + 1).fill(null).map(() => Array(b.length + 1).fill(0));
          for (let i = 0; i <= a.length; i++) dp[i][0] = i;
          for (let j = 0; j <= b.length; j++) dp[0][j] = j;
          for (let i = 1; i <= a.length; i++) {
            for (let j = 1; j <= b.length; j++) {
              const cost = a[i - 1] === b[j - 1] ? 0 : 1;
              dp[i][j] = Math.min(
                dp[i - 1][j] + 1,
                dp[i][j - 1] + 1,
                dp[i - 1][j - 1] + cost
              );
            }
          }
          return dp[a.length][b.length];
        }

        markerRefs.forEach(item => {
          const score = distance(normalizedQuery, item.mekan.ad.toLowerCase());
          if (item.mekan.ad.toLowerCase().includes(normalizedQuery)) {
            bestMatch = item;
            bestScore = 0;
          } else if (score < bestScore) {
            bestScore = score;
            bestMatch = item;
          }
        });

        if (bestMatch && bestScore <= 5) {
          map.setView([bestMatch.mekan.lat, bestMatch.mekan.lng], 15);
          bestMatch.marker.openPopup();
        }
      }
    });

    document.getElementById('filterType').addEventListener('change', function() {
      renderMarkers(document.getElementById('searchBox').value, this.value);
    });
